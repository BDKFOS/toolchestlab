<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Apology Email Generator | ToolChestLab</title>

<meta name="description" content="Generate a professional apology email for work, clients, coworkers, or managers.">

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f6f8;
color:#222;
}

.container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
border:1px solid #e5e5e5;
}

h1{
margin-top:0;
}

label{
display:block;
margin-top:18px;
font-weight:bold;
}

select, textarea, input{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

textarea{
min-height:120px;
}

button{
margin-top:20px;
padding:12px 18px;
background:#0070f3;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.result{
margin-top:30px;
background:#fafafa;
padding:20px;
border:1px solid #e5e5e5;
border-radius:6px;
white-space:pre-wrap;
}

.back{
display:inline-block;
margin-bottom:20px;
color:#0070f3;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<a class="back" href="/tools.html">← Back to Tools</a>

<div class="card">

<h1>Professional Apology Email Generator</h1>

<p>Generate a professional apology email for workplace or business situations.</p>

<label>Who is the email for?</label>

<select id="recipient">
<option>Client</option>
<option>Boss</option>
<option>Coworker</option>
<option>Manager</option>
<option>Employee</option>
<option>Professor or Teacher</option>
</select>


<label>Tone</label>

<select id="tone">
<option>Professional</option>
<option>Formal</option>
<option>Warm</option>
<option>Concise</option>
</select>


<label>What happened?</label>

<textarea id="situation" placeholder="Example: I missed an important meeting with a client this morning."></textarea>


<label>Your name (optional)</label>

<input id="name" placeholder="Example: Jesse">


<button onclick="generateEmail()">Generate Email</button>


<div id="result" class="result">

Your generated email will appear here.

</div>

</div>

</div>


<script>

async function generateEmail(){

const recipient=document.getElementById("recipient").value
const tone=document.getElementById("tone").value
const situation=document.getElementById("situation").value
const name=document.getElementById("name").value

const prompt=`Write a professional apology email.

Recipient: ${recipient}
Tone: ${tone}

Situation:
${situation}

Include:
- A subject line
- A sincere apology
- Responsibility for the mistake
- A corrective step if appropriate
- A professional closing

Signed:
${name || "Sender"}
`

document.getElementById("result").innerText="Generating..."

const response=await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt
})
})

const data=await response.json()

document.getElementById("result").innerText=data.message

}

</script>

</body>
</html>
