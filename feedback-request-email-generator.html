<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedback Request Email Generator | ToolChestLab</title>
<meta name="description" content="Generate a professional email asking for feedback from clients, customers, managers, or coworkers.">

window.dataLayer = window.dataLayer || [];

<style>
*{box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
color:#222;
margin:0;
padding:40px 20px;

background-color:#eef4fb;

background-image:
linear-gradient(rgba(50,90,140,0.10) 1px, transparent 1px),
linear-gradient(90deg, rgba(50,90,140,0.10) 1px, transparent 1px);

background-size:32px 32px;
}

.page-wrap{max-width:760px;margin:0 auto;}

.container{
background:white;
padding:30px;
border-radius:12px;
border:1px solid #e5e5e5;
box-shadow:0 8px 24px rgba(0,0,0,0.10);
}

textarea,select,input,button{
width:100%;
margin-bottom:20px;
padding:12px;
font-size:16px;
border-radius:8px;
}

textarea,select,input{border:1px solid #d9d9d9;}

button{
background:#0070f3;
color:white;
border:none;
cursor:pointer;
}

button:hover{background:#0059c7;}

#result{
margin-top:20px;
background:#fafafa;
padding:20px;
border-radius:8px;
border:1px solid #ececec;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="page-wrap">

<a href="/">← Back to ToolChestLab</a>

<div class="container">

<h1>Feedback Request Email Generator</h1>
<p>Generate a professional email asking for feedback.</p>

<label for="recipient">Who is the feedback request for?</label>
<select id="recipient">
<option>Client</option>
<option>Customer</option>
<option>Manager</option>
<option>Coworker</option>
<option>Team</option>
</select>

<label for="tone">Tone</label>
<select id="tone">
<option>Professional</option>
<option>Friendly</option>
<option>Polite</option>
<option>Concise</option>
</select>

<label for="context">What feedback are you requesting?</label>
<textarea id="context" rows="5" placeholder="Example: I want to ask a client for feedback on a website project we just completed."></textarea>

<label for="name">Your name (optional)</label>
<input id="name" type="text" placeholder="Example: Jesse">

<button onclick="generateEmail()">Generate Email</button>

<div id="result">Your feedback request email will appear here.</div>

<button onclick="copyResult()">Copy Email</button>

</div>
</div>

<script>

async function generateEmail(){

const context=document.getElementById("context").value;
const tone=document.getElementById("tone").value;
const recipient=document.getElementById("recipient").value;
const name=document.getElementById("name").value;
const result=document.getElementById("result");

if(!context.trim()){
result.innerText="Please describe the feedback request.";
return;
}

result.innerText="Generating...";

const prompt=`Write a ${tone.toLowerCase()} email asking a ${recipient} for feedback.

Situation:
${context}

Requirements:
- Include a subject line
- Be polite and appreciative
- Make the feedback request clear
- Keep it short and professional

Signed:
${name || "Sender"}`;

const response=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data=await response.json();

result.innerText=data.message || "Something went wrong.";
}

function copyResult(){
navigator.clipboard.writeText(document.getElementById("result").innerText);
alert("Copied!");
}

</script>

</body>
</html>
